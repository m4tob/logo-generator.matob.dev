<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo Generator</title>
<meta name="description" content="Your logo ready in seconds — no designer, no sign-up, nothing to pay. Create clean monogram logos for companies, projects, prototypes, or that presentation due tomorrow.">
<meta property="og:title" content="Logo Generator">
<meta property="og:description" content="Type the name, pick a color, and download your logo as PNG or SVG. Free, no sign-up.">
<meta property="og:type" content="website">
<link rel="icon" id="favicon" type="image/png">
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --ink: #1c2330;
    --muted: #6b7486;
    --line: #e2e5ea;
    --accent: #2a5db0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    padding: 28px 32px 10px;
    max-width: 980px;
    margin: 0 auto;
  }
  header h1 { margin: 0 0 6px; font-size: 22px; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }
  main {
    max-width: 980px;
    margin: 20px auto 48px;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
  label:first-child { margin-top: 0; }
  .hint { font-weight: 400; color: var(--muted); }
  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    color: var(--ink);
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  input[type="color"] {
    flex: 0 0 46px;
    height: 38px;
    padding: 2px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
  }
  button {
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { border-color: #c3c9d4; background: #fafbfc; }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover { filter: brightness(1.08); }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .preset {
    width: 34px; height: 34px;
    border-radius: 9px;
    border: none;
    color: #fff;
    font: inherit;
    font-size: 15px;
    padding: 0;
    display: grid;
    place-items: center;
  }
  .preset:hover { transform: scale(1.08); }
  .preview-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .checker {
    padding: 24px;
    border-radius: 12px;
    background:
      repeating-conic-gradient(#e8eaee 0% 25%, #f8f9fb 0% 50%) 0 0 / 24px 24px;
    border: 1px solid var(--line);
    line-height: 0;
  }
  canvas { width: 256px; height: 256px; image-rendering: auto; }
  .downloads { display: flex; gap: 10px; }
  .meta { font-size: 12px; color: var(--muted); text-align: center; }
  body.bare { background: transparent; }
  body.bare header, body.bare .controls, body.bare .downloads, body.bare .meta { display: none; }
  body.bare main { margin: 0; padding: 0; display: block; max-width: none; }
  body.bare .checker { padding: 0; border: none; background: none; border-radius: 0; }
  body.bare .panel { border: none; padding: 0; background: none; border-radius: 0; }
</style>
</head>
<body>
<header>
  <h1>Logo Generator</h1>
  <p>Your logo ready in seconds — no designer, no sign-up, nothing to pay. Create clean monogram logos for companies, projects, prototypes, or that presentation due tomorrow.</p>
</header>
<main>
  <div class="panel controls">
    <label for="name">Organization name</label>
    <input type="text" id="name" placeholder="e.g. Matob" value="Matob">

    <label for="letters">Letter(s) <span class="hint"> (1–3 letters)</span></label>
    <input type="text" id="letters" maxlength="3" value="M">

    <label for="colorHex">Background color</label>
    <div class="row">
      <input type="color" id="colorPicker" value="#2a5db0">
      <input type="text" id="colorHex" value="#2A5DB0" spellcheck="false">
    </div>
    <div class="btn-row">
      <button id="btnRandom" type="button">🎲 Random color</button>
    </div>

    <label for="font">Font</label>
    <select id="font"></select>

    <label>Suggestions<span class="hint"> (click to apply)</span></label>
    <div class="presets" id="presets"></div>

    <label for="size">Export size</label>
    <select id="size">
      <option value="32">32 × 32 px</option>
      <option value="64">64 × 64 px</option>
      <option value="128">128 × 128 px</option>
      <option value="256" selected>256 × 256 px</option>
      <option value="512">512 × 512 px</option>
      <option value="1024">1024 × 1024 px</option>
    </select>
  </div>

  <div class="panel preview-wrap">
    <div class="checker"><canvas id="cv" width="256" height="256"></canvas></div>
    <div class="downloads">
      <button class="primary" id="btnPng" type="button">⬇ Download PNG</button>
      <button id="btnSvg" type="button">⬇ Download SVG</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</main>

  const fontById = (id) => FONTS.find((f) => f.id === id) || FONTS[0];
  const fontSpec = (font, fs) => font.weight + " " + fs + 'px "' + font.family + '", "DejaVu Sans", sans-serif';

  const PRESETS = [
    ["A", "A", randomColor()],
    ["B", "B", randomColor()],
    ["C", "C", randomColor()],
    ["D", "D", randomColor()],
    ["E", "E", randomColor()],
    ["F", "F", randomColor()],
    ["G", "G", randomColor()],
    ["H", "H", randomColor()],
    ["I", "I", randomColor()],
    ["J", "J", randomColor()],
    ["K", "K", randomColor()],
    ["L", "L", randomColor()],
    ["M", "M", randomColor()],
    ["N", "N", randomColor()],
    ["O", "O", randomColor()],
    ["P", "P", randomColor()],
    ["Q", "Q", randomColor()],
    ["R", "R", randomColor()],
    ["S", "S", randomColor()],
    ["T", "T", randomColor()],
    ["U", "U", randomColor()],
    ["V", "V", randomColor()],
    ["W", "W", randomColor()],
    ["X", "X", randomColor()],
    ["Y", "Y", randomColor()],
    ["Z", "Z", randomColor()],
    ["1", "1", randomColor()],
    ["2", "2", randomColor()],
    ["3", "3", randomColor()],
    ["4", "4", randomColor()],
    ["5", "5", randomColor()],
    ["6", "6", randomColor()],
    ["7", "7", randomColor()],
    ["8", "8", randomColor()],
    ["9", "9", randomColor()],
    ["0", "0", randomColor()],
  ];

  const $ = (id) => document.getElementById(id);
  const cv = $("cv"), ctx = cv.getContext("2d");
  let lettersEdited = false;
  let fontReady = false;

  // ---- utilities ----
  const stripAccents = (s) => s.normalize("NFD").replace(/[̀-ͯ]/g, "");

  function deriveInitial(name) {
    const clean = stripAccents(name).toUpperCase().match(/[A-Z0-9]/);
    return clean ? clean[0] : "";
  }

  function slug(name) {
    const s = stripAccents(name).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    return s || "logo";
  }

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = (n) => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = (n) => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    const to = (v) => Math.round(v * 255).toString(16).padStart(2, "0");
    return ("#" + to(f(0)) + to(f(8)) + to(f(4))).toUpperCase();
  }

  function randomColor() {
    const h = Math.floor(Math.random() * 360);
    const s = (Math.random() > 0.1 ? (80 + Math.random() * 20) : (5 + Math.random() * 5)); // 80–100% (9/10) or 5–10% (1/10)
    const l = 20 + Math.random() * 40;   // 20–50%
    return hslToHex(h, s, l);
  }

  function normalizeHex(v) {
    let s = v.trim().replace(/^#?/, "");
    if (/^[0-9a-f]{3}$/i.test(s)) s = s.replace(/./g, (c) => c + c);
    return /^[0-9a-f]{6}$/i.test(s) ? "#" + s.toUpperCase() : null;
  }

  // ---- drawing ----
  function roundedRectPath(c, x, y, w, h, r) {
    if (c.roundRect) { c.roundRect(x, y, w, h, r); return; }
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  function measureInk(c, text) {
    const m = c.measureText(text);
    return {
      w: m.actualBoundingBoxLeft + m.actualBoundingBoxRight,
      h: m.actualBoundingBoxAscent + m.actualBoundingBoxDescent,
      left: m.actualBoundingBoxLeft,
      ascent: m.actualBoundingBoxAscent,
      descent: m.actualBoundingBoxDescent,
    };
  }

  // scale the font until the ink box reaches the target height (68% of the
  // square), capping the width at 72% — which keeps 2+ letters fitting
  function fitFont(c, text, size, font) {
    const square = size - 2 * Math.round(SPEC.margin * size / SPEC.size);
    const REF = 100;
    c.font = fontSpec(font, REF);
    const ink = measureInk(c, text);
    let fs = Math.round(REF * (square * SPEC.inkHeight) / Math.max(ink.h, 1));
    c.font = fontSpec(font, fs);
    const w = measureInk(c, text).w;
    if (w > square * SPEC.maxInkWidth) fs = Math.floor(fs * square * SPEC.maxInkWidth / w);
    c.font = fontSpec(font, fs);
    return fs;
  }

  function draw(canvas, letters, color, size, font) {
    canvas.width = size;
    canvas.height = size;
    const c = canvas.getContext("2d");
    c.clearRect(0, 0, size, size);

    const margin = Math.round(SPEC.margin * size / SPEC.size);
    const radius = Math.round(SPEC.radius * size / SPEC.size);

    c.beginPath();
    roundedRectPath(c, margin, margin, size - 2 * margin, size - 2 * margin, radius);
    c.fillStyle = color;
    c.fill();

    if (!letters) return null;
    const fs = fitFont(c, letters, size, font);
    // center using the real ink box (the canvas equivalent of Pillow's textbbox)
    const ink = measureInk(c, letters);
    const x = (size - ink.w) / 2 + ink.left;
    const y = (size - ink.h) / 2 + ink.ascent;
    c.fillStyle = "#FFFFFF";
    c.fillText(letters, x, y);
    return { fs, ink, x, y };
  }

  // ---- state / render ----
  function currentState() {
    const name = $("name").value;
    const letters = stripAccents($("letters").value).toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 3);
    const color = normalizeHex($("colorHex").value) || $("colorPicker").value.toUpperCase();
    const size = parseInt($("size").value, 10);
    const font = fontById($("font").value);
    return { name, letters, color, size, font };
  }

  // favicon = the current logo in miniature, generated by the same draw()
  const faviconCv = document.createElement("canvas");
  function updateFavicon(letters, color, font) {
    draw(faviconCv, letters, color, 64, font);
    $("favicon").href = faviconCv.toDataURL("image/png");
  }

  function render() {
    const { name, letters, color, size, font } = currentState();
    draw(cv, letters, color, size, font);
    cv.style.width = cv.style.height = (document.body.classList.contains("bare") ? size : 256) + "px";
    $("meta").textContent = size + " × " + size + " px · transparent PNG · " + color + " · " + font.family +
      (fontReady ? "" : " · loading fonts…");
    // the preset chips preview the selected font (buttons use font: inherit)
    $("presets").style.fontFamily = '"' + font.family + '", sans-serif';
    $("presets").style.fontWeight = font.weight;
    updateFavicon(letters, color, font);
  }

  // ---- export ----
  function downloadPng() {
    const { name, letters, color, size, font } = currentState();
    const off = document.createElement("canvas");
    draw(off, letters, color, size, font);
    off.toBlob((blob) => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = slug(name || letters) + ".png";
      a.click();
      URL.revokeObjectURL(a.href);
    }, "image/png");
  }

  function downloadSvg() {
    const { name, letters, color, size, font } = currentState();
    const off = document.createElement("canvas");
    const g = draw(off, letters, color, size, font);
    const margin = Math.round(SPEC.margin * size / SPEC.size);
    const radius = Math.round(SPEC.radius * size / SPEC.size);
    const sq = size - 2 * margin;
    let text = "";
    if (g) {
      text = '<text x="' + g.x.toFixed(2) + '" y="' + g.y.toFixed(2) +
        '" font-family="' + font.family + '" font-weight="' + font.weight +
        '" font-size="' + g.fs + '" fill="#FFFFFF">' + letters + "</text>";
    }
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size +
      '" viewBox="0 0 ' + size + " " + size + '">\n' +
      "<style>@font-face{font-family:'" + font.family + "';src:url(data:font/woff2;base64," + font.b64 +
      ") format('woff2');}</style>\n" +
      '<rect x="' + margin + '" y="' + margin + '" width="' + sq + '" height="' + sq +
      '" rx="' + radius + '" fill="' + color + '"/>\n' + text + "\n</svg>";
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
    a.download = slug(name || letters) + ".svg";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  // ---- UI wiring ----
  $("name").addEventListener("input", () => {
    if (!lettersEdited) $("letters").value = deriveInitial($("name").value);
    render();
  });
  $("letters").addEventListener("input", () => {
    lettersEdited = $("letters").value !== "";
    if (!lettersEdited) $("letters").value = deriveInitial($("name").value);
    render();
  });
  $("colorPicker").addEventListener("input", () => {
    $("colorHex").value = $("colorPicker").value.toUpperCase();
    render();
  });
  $("colorHex").addEventListener("input", () => {
    const hex = normalizeHex($("colorHex").value);
    if (hex) $("colorPicker").value = hex;
    render();
  });
  $("btnRandom").addEventListener("click", () => {
    const c = randomColor();
    $("colorHex").value = c;
    $("colorPicker").value = c;
    render();
  });
  $("btnPng").addEventListener("click", downloadPng);
  $("btnSvg").addEventListener("click", downloadSvg);

  const fontSel = $("font");
  for (const f of FONTS) {
    const o = document.createElement("option");
    o.value = f.id;
    o.textContent = f.label;
    fontSel.appendChild(o);
  }
  fontSel.addEventListener("change", render);
  $("size").addEventListener("change", render);

  const presetsBox = $("presets");
  for (const [label, letter, color] of PRESETS) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "preset";
    b.style.background = color;
    b.textContent = letter;
    b.title = label + " · " + color;
    b.addEventListener("click", () => {
      $("name").value = label;
      $("letters").value = letter;
      lettersEdited = letter !== deriveInitial(label);
      $("colorHex").value = color;
      $("colorPicker").value = color;
      render();
    });
    presetsBox.appendChild(b);
  }

  // ---- URL params (?name=&letters=&color=&size=&font=&bare=1) ----
  const qs = new URLSearchParams(location.search);
  if (qs.get("name")) {
    $("name").value = qs.get("name");
    $("letters").value = deriveInitial(qs.get("name"));
  }
  if (qs.get("letters")) { $("letters").value = qs.get("letters"); lettersEdited = true; }
  if (qs.get("color")) {
    const hex = normalizeHex(qs.get("color"));
    if (hex) { $("colorHex").value = hex; $("colorPicker").value = hex; }
  }
  if (qs.get("size")) {
    const s = qs.get("size");
    if ([...$("size").options].some((o) => o.value === s)) $("size").value = s;
  }
  if (qs.get("font") && FONTS.some((f) => f.id === qs.get("font"))) fontSel.value = qs.get("font");
  if (qs.get("bare") === "1") document.body.classList.add("bare");

  // ---- embedded fonts: draw with the fallback right away, redraw once loaded ----
  render();
  const faces = FONTS.map((f) => new FontFace(f.family, "url(data:font/woff2;base64," + f.b64 + ")", { weight: f.weight }));
  Promise.allSettled(faces.map((face) => face.load())).then((results) => {
    for (const r of results) if (r.status === "fulfilled") document.fonts.add(r.value);
    fontReady = true;
    render();
    document.documentElement.dataset.fontReady = "1";
  });
})();
</script>
</body>
</html>
